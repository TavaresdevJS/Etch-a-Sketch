<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Etch a Sketch</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="content">
      <h1>This is the etch a sketch app!</h1>
      <div class="grid"></div>
      <div class="buttons">
        <button class="blackBtn">Black</button>
        <button class="whiteBtn">White</button>
        <button class="randomBtn">Random</button>
        <button class="resetBtn">Reset</button>
      </div>
      <div class="sizeDiv">
        <input
          class="input"
          type="text"
          placeholder="Size of grid"
          value="16"
        />
        <button class="sizeBtn">Set Size</button>
      </div>
    </div>
    <footer>
      <img
        src="mascot.png"
        alt="Mitsuri from demon slayer as a painter"
        class="mascot"
      />
    </footer>
    <script src="script.js"></script>
  </body>
</html>
